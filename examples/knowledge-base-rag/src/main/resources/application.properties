# Keep provider credentials in runtime environment variables rather than source control.
ai.sdk.api-key=${AI_SDK_API_KEY:replace-me}
ai.sdk.base-url=${AI_SDK_BASE_URL:replace-me}
ai.sdk.model=${AI_SDK_MODEL:gpt-4.1-mini}
ai.sdk.embedding-model=${AI_SDK_EMBEDDING_MODEL:text-embedding-3-small}
ai.sdk.provider-preset=${AI_SDK_PROVIDER_PRESET:openai}
ai.sdk.timeout=30s
ai.sdk.retry.enabled=true
ai.sdk.retry.max-attempts=3

app.rag.top-k=2
