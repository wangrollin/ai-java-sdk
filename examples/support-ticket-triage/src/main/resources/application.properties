# Real applications should provide this value through environment-specific
# configuration, for example AI_SDK_API_KEY, instead of committing credentials.
ai.sdk.api-key=${AI_SDK_API_KEY:replace-me}
ai.sdk.model=${AI_SDK_MODEL:gpt-4.1-mini}
ai.sdk.provider-preset=${AI_SDK_PROVIDER_PRESET:openai}
ai.sdk.timeout=30s
ai.sdk.retry.enabled=true
ai.sdk.retry.max-attempts=3
